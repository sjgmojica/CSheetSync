<!DOCTYPE html>
<html>

<head>
    <base target="_top">

    <style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#f3f6fb;
    font-family:Arial,Helvetica,sans-serif;
    color:#1f2937;
}

.container{
    width:100%;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;

    background:#166534;
    color:white;

    padding:20px 24px;

    border-radius:12px 12px 0 0;
}

.header h1{
    margin:0;
    font-size:24px;
}

.sheet-info{
    margin-top:8px;
}

.label{
    display:block;
    font-size:12px;
    opacity:.8;
}

.sheet-name{
    font-size:16px;
    font-weight:bold;
}

.badge{
    padding:8px 16px;
    border-radius:30px;
    font-size:13px;
    font-weight:bold;
}

.badge.ready{
    background:#16a34a;
    color:white;
}

.badge.processing{
    background:#ca8a04;
    color:white;
}

.badge.success{
    background:#16a34a;
    color:white;
}

.badge.error{
    background:#dc2626;
    color:white;
}

.main-grid{

    display:grid;

    grid-template-columns:380px 1fr;

    gap:20px;

    margin-top:20px;

}

.panel{

    background:white;

    border-radius:12px;

    padding:20px;

    box-shadow:0 4px 12px rgba(0,0,0,.08);

}

.panel h2{

    margin-top:0;

    margin-bottom:20px;

}

.drop-zone{

    border:2px dashed #cbd5e1;

    border-radius:12px;

    text-align:center;

    padding:40px 20px;

    cursor:pointer;

    transition:.2s;

}

.drop-zone:hover{

    background:#f0fdf4;

    border-color:#16a34a;

}

.drop-zone.dragover{

    background:#f0fdf4;

    border-color:#15803d;

}

.drop-icon{

    font-size:50px;

}

.drop-zone h3{

    margin:10px 0;

}

.drop-zone p{

    color:#6b7280;

}

input[type=file]{

    display:none;

}

.file-card{

    display:flex;

    align-items:center;

    gap:15px;

    margin-top:20px;

    padding:16px;

    border:1px solid #e5e7eb;

    border-radius:10px;

    background:#fafafa;

}

.file-icon{

    font-size:40px;

}

.file-details{

    flex:1;

}

#fileName{

    font-weight:bold;

}

#fileSize{

    color:#6b7280;

    font-size:13px;

}

.button-group{

    display:flex;

    gap:10px;

    margin-top:20px;

}

.button-group button{

    flex:1;

    padding:12px;

    border:none;

    border-radius:8px;

    cursor:pointer;

    font-size:14px;

    transition:.2s;

}

#uploadBtn{

    background:#16a34a;

    color:white;

}

#uploadBtn:hover{

    background:#15803d;

}

#uploadBtn:disabled{

    background:#9ca3af;

    cursor:not-allowed;

}

#cancelBtn{

    background:white;

    border:1px solid #d1d5db;

}

.progress-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:20px;

}

.progress-header h2{

    margin:0;

}

.progress-percent{

    font-size:18px;

    font-weight:bold;

    color:#15803d;

}

.progress-container{

    width:100%;

    height:22px;

    background:#e5e7eb;

    border-radius:20px;

    overflow:hidden;

    margin-bottom:12px;

}

.progress-bar{

    width:0%;

    height:100%;

    background:#16a34a;

    transition:.3s;

}

.status-text{

    color:#6b7280;

    font-size:14px;

    display:flex;

    align-items:center;

    gap:6px;

}

.stats-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:15px;

    margin:20px 0;

}

.stat-card{

    background:#f8fafc;

    border:1px solid #e5e7eb;

    border-radius:10px;

    padding:16px;

    text-align:center;

}

.stat-card.stat-card-full{

    grid-column:1 / -1;

}

.stat-title{

    display:block;

    color:#6b7280;

    font-size:13px;

}

.stat-value{

    display:block;

    margin-top:10px;

    font-size:28px;

    font-weight:bold;

    color:#15803d;

}

.summary-details{

    margin-top:20px;

}

.detail-row{

    display:flex;

    justify-content:space-between;

    padding:8px 0;

    border-bottom:1px solid #f1f5f9;

}

.message-box{

    margin-top:20px;

    padding:15px;

    border-radius:10px;

    background:#f0fdf4;

    border-left:5px solid #16a34a;

    min-height:70px;

    line-height:1.6;

}

.message-box.error{

    background:#fef2f2;

    border-left-color:#dc2626;

}

@media(max-width:900px){

.main-grid{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="container">

    <!-- =======================================================
         HEADER
    ======================================================== -->

    <header class="header">

        <div class="header-left">

            <h1>📤 CSV Import</h1>

            <div class="sheet-info">

                <span class="label">
                    Destination Sheet
                </span>

                <span class="sheet-name">
                    <?= sheetName ?>
                </span>

            </div>

        </div>

        <div class="header-right">

            <span id="connectionStatus" class="badge ready">
                Ready
            </span>

        </div>

    </header>


    <!-- =======================================================
         MAIN CONTENT
    ======================================================== -->

    <main class="main-grid">

        <!-- ==========================================
             LEFT PANEL
        =========================================== -->

        <section class="left-panel">

            <div class="panel">

                <h2>Upload CSV</h2>

                <div
                    id="dropZone"
                    class="drop-zone">

                    <div class="drop-icon">

                        📁

                    </div>

                    <h3>

                        Drag & Drop CSV

                    </h3>
                    <p>
                        or click to browse
                    </p>

                    <input
                        type="file"
                        id="fileInput"
                        accept=".csv">

                </div>


                <!-- Selected File -->

                <div
                    id="fileCard"
                    class="file-card">
                    <div class="file-details">

                        <div
                            id="fileName">
                            No file selected
                        </div>

                        <div
                            id="fileSize">

                            —

                        </div>

                    </div>

                </div>


                <!-- Buttons -->

                <div class="button-group">

                    <button
                        id="uploadBtn">

                        Upload & Update

                    </button>

                    <button
                        id="cancelBtn">

                        Cancel

                    </button>

                </div>

            </div>

        </section>



        <!-- ==========================================
             RIGHT PANEL
        =========================================== -->

        <section class="right-panel">

            <!-- Progress -->

            <div class="panel">

                <div class="progress-header">

                    <h2>

                        Import Progress

                    </h2>

                    <span
                        id="progressPercent"
                        class="progress-percent">

                        0%

                    </span>

                </div>

                <div
                    class="progress-container">

                    <div
                        id="progressBar"
                        class="progress-bar">

                    </div>

                </div>

                <div
                    id="statusText"
                    class="status-text">

                    Waiting for file...

                </div>

            </div>



            <!-- Summary -->

            <div class="panel">

                <h2>

                    Import Summary

                </h2>


                <div class="stats-grid">

                    <div class="stat-card">

                        <span class="stat-title">

                            Total

                        </span>

                        <span
                            id="totalCount"
                            class="stat-value">

                            0

                        </span>

                    </div>


                    <div class="stat-card">

                        <span class="stat-title">

                            Updated

                        </span>

                        <span
                            id="updatedCount"
                            class="stat-value">

                            0

                        </span>

                    </div>


                    <div class="stat-card">

                        <span class="stat-title">

                            Inserted

                        </span>

                        <span
                            id="insertedCount"
                            class="stat-value">

                            0

                        </span>

                    </div>


                    <div class="stat-card">

                        <span class="stat-title">

                            Skipped

                        </span>

                        <span
                            id="skippedCount"
                            class="stat-value">

                            0

                        </span>

                    </div>


                    <div class="stat-card stat-card-full">

                        <span class="stat-title">

                            Unchanged

                        </span>

                        <span
                            id="unchangedCount"
                            class="stat-value">

                            0

                        </span>

                    </div>

                </div>



                <!-- Import Details -->

                <div class="summary-details">

                    <div class="detail-row">

                        <span>Started</span>

                        <span id="startedAt">-</span>

                    </div>

                    <div class="detail-row">

                        <span>Completed</span>

                        <span id="completedAt">-</span>

                    </div>

                    <div class="detail-row">

                        <span>Duration</span>

                        <span id="duration">-</span>

                    </div>

                </div>


                <!-- Message -->

                <div
                    id="messageBox"
                    class="message-box">

                    Waiting for import...

                </div>

            </div>

        </section>

    </main>

</div>


<script>

//======================================================
// GLOBAL VARIABLES
//======================================================

let selectedFile = null;

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const uploadBtn = document.getElementById("uploadBtn");
const cancelBtn = document.getElementById("cancelBtn");

const fileName = document.getElementById("fileName");
const fileSize = document.getElementById("fileSize");

const statusText = document.getElementById("statusText");
const progressBar = document.getElementById("progressBar");
const progressPercent = document.getElementById("progressPercent");
const connectionStatus = document.getElementById("connectionStatus");
const messageBox = document.getElementById("messageBox");

//======================================================
// INITIALIZE
//======================================================

document.addEventListener("DOMContentLoaded", initialize);

function initialize() {

    bindEvents();

    resetDialog();

}

//======================================================
// EVENTS
//======================================================

function bindEvents() {

    // Browse

    dropZone.addEventListener("click", () => {

        fileInput.click();

    });

    fileInput.addEventListener("change", (e) => {

        if (e.target.files.length) {

            handleFile(e.target.files[0]);

        }

    });

    // Drag Enter

    dropZone.addEventListener("dragenter", (e) => {

        e.preventDefault();

        dropZone.classList.add("dragover");

    });

    // Drag Over

    dropZone.addEventListener("dragover", (e) => {

        e.preventDefault();

        dropZone.classList.add("dragover");

    });

    // Drag Leave

    dropZone.addEventListener("dragleave", () => {

        dropZone.classList.remove("dragover");

    });

    // Drop

    dropZone.addEventListener("drop", (e) => {

        e.preventDefault();

        dropZone.classList.remove("dragover");

        if (e.dataTransfer.files.length) {

            handleFile(e.dataTransfer.files[0]);

        }

    });

    // Upload

    uploadBtn.addEventListener("click", uploadFile);

    // Cancel

    cancelBtn.addEventListener("click", () => {

        google.script.host.close();

    });

}

//======================================================
// HANDLE FILE
//======================================================

function handleFile(file) {

    if (!file) return;

    if (!file.name.toLowerCase().endsWith(".csv")) {

        alert("Please select a CSV file.");

        return;

    }

    selectedFile = file;

    fileName.textContent = file.name;

    fileSize.textContent = formatFileSize(file.size);

    statusText.textContent = "Ready to upload";

    uploadBtn.disabled = false;

}

//======================================================
// PROGRESS + STATUS HELPERS
//======================================================

function setProgress(percent) {

    progressBar.style.width = percent + "%";

    progressPercent.textContent = percent + "%";

}

function setBadge(text, state) {

    connectionStatus.textContent = text;

    connectionStatus.className = "badge " + state;

}

//======================================================
// RESET
//======================================================

function resetDialog() {

    selectedFile = null;

    uploadBtn.disabled = true;

    fileName.textContent = "No file selected";

    fileSize.textContent = "—";

    setProgress(0);

    setBadge("Ready", "ready");

    statusText.textContent = "Waiting for CSV file...";

    messageBox.classList.remove("error");

    messageBox.textContent = "Waiting for import...";

}

//======================================================
// FORMAT FILE SIZE
//======================================================

function formatFileSize(bytes) {

    if (bytes < 1024)

        return bytes + " bytes";

    if (bytes < 1024 * 1024)

        return (bytes / 1024).toFixed(1) + " KB";

    return (bytes / (1024 * 1024)).toFixed(2) + " MB";

}

//======================================================
// UPLOAD FILE
//======================================================

function uploadFile() {

    if (!selectedFile) {

        alert("Please select a CSV file.");

        return;

    }

    uploadBtn.disabled = true;

    setBadge("Processing...", "processing");

    setProgress(20);

    statusText.textContent = "Reading CSV file...";

    const reader = new FileReader();

    reader.onload = function(e) {

        setProgress(50);

        statusText.textContent = "Uploading to Apps Script...";

        google.script.run
            .withSuccessHandler(importCompleted)
            .withFailureHandler(importFailed)
            .processCSV(
                e.target.result,
                selectedFile.name
            );

    };

    reader.readAsText(selectedFile);

}

//======================================================
// IMPORT SUCCESS
//======================================================

function importCompleted(result) {

    setProgress(100);

    uploadBtn.disabled = false;

    if (!result.success) {

        setBadge("Failed", "error");

        statusText.textContent = "❌ Import failed.";

        messageBox.classList.add("error");

        messageBox.textContent = result.message;

        return;

    }

    setBadge("Completed", "success");

    statusText.textContent = "✅ Import completed.";

    document.getElementById("totalCount").textContent =
        result.total;

    document.getElementById("updatedCount").textContent =
        result.updated;

    document.getElementById("insertedCount").textContent =
        result.inserted;

    document.getElementById("unchangedCount").textContent =
        result.unchanged;

    document.getElementById("skippedCount").textContent =
        result.skipped;

    document.getElementById("startedAt").textContent =
        result.startedAt;

    document.getElementById("completedAt").textContent =
        result.completedAt;

    document.getElementById("duration").textContent =
        result.duration;

    messageBox.classList.remove("error");

    messageBox.textContent = result.message;

}


//======================================================
// IMPORT FAILED
//======================================================

function importFailed(error) {

    uploadBtn.disabled = false;

    setProgress(0);

    setBadge("Failed", "error");

    statusText.textContent = "❌ Import failed.";

    messageBox.classList.add("error");

    messageBox.textContent = error.message || error;

}

</script>

</body>

</html>
