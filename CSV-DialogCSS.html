<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#f3f6fb;
    font-family:Arial,Helvetica,sans-serif;
    color:#1f2937;
}

.container{
    width:100%;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;

    background:#1E3A8A;
    color:white;

    padding:20px 24px;

    border-radius:12px 12px 0 0;
}

.header h1{
    margin:0;
    font-size:24px;
}

.sheet-info{
    margin-top:8px;
}

.label{
    display:block;
    font-size:12px;
    opacity:.8;
}

.sheet-name{
    font-size:16px;
    font-weight:bold;
}

.badge{
    padding:8px 16px;
    border-radius:30px;
    font-size:13px;
    font-weight:bold;
}

.badge.ready{
    background:#16a34a;
    color:white;
}

.main-grid{

    display:grid;

    grid-template-columns:380px 1fr;

    gap:20px;

    margin-top:20px;

}

.panel{

    background:white;

    border-radius:12px;

    padding:20px;

    box-shadow:0 4px 12px rgba(0,0,0,.08);

}

.panel h2{

    margin-top:0;

    margin-bottom:20px;

}

.drop-zone{

    border:2px dashed #cbd5e1;

    border-radius:12px;

    text-align:center;

    padding:40px 20px;

    cursor:pointer;

    transition:.2s;

}

.drop-zone:hover{

    background:#eef2ff;

    border-color:#4f46e5;

}

.drop-zone.dragover{

    background:#eef2ff;

    border-color:#4338ca;

}

.drop-icon{

    font-size:50px;

}

.drop-zone h3{

    margin:10px 0;

}

.drop-zone p{

    color:#6b7280;

}

input[type=file]{

    display:none;

}

.file-card{

    display:flex;

    align-items:center;

    gap:15px;

    margin-top:20px;

    padding:16px;

    border:1px solid #e5e7eb;

    border-radius:10px;

    background:#fafafa;

}

.file-icon{

    font-size:40px;

}

.file-details{

    flex:1;

}

#fileName{

    font-weight:bold;

}

#fileSize{

    color:#6b7280;

    font-size:13px;

}

.button-group{

    display:flex;

    gap:10px;

    margin-top:20px;

}

.button-group button{

    flex:1;

    padding:12px;

    border:none;

    border-radius:8px;

    cursor:pointer;

    font-size:14px;

    transition:.2s;

}

#uploadBtn{

    background:#4f46e5;

    color:white;

}

#uploadBtn:hover{

    background:#4338ca;

}

#cancelBtn{

    background:white;

    border:1px solid #d1d5db;

}

.progress-container{

    width:100%;

    height:12px;

    background:#e5e7eb;

    border-radius:20px;

    overflow:hidden;

    margin-bottom:12px;

}

.progress-bar{

    width:0%;

    height:100%;

    background:#4f46e5;

    transition:.3s;

}

.status-text{

    color:#6b7280;

    font-size:14px;

}

.stats-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:15px;

    margin:20px 0;

}

.stat-card{

    background:#f8fafc;

    border:1px solid #e5e7eb;

    border-radius:10px;

    padding:16px;

    text-align:center;

}

.stat-title{

    display:block;

    color:#6b7280;

    font-size:13px;

}

.stat-value{

    display:block;

    margin-top:10px;

    font-size:28px;

    font-weight:bold;

    color:#1E3A8A;

}

.summary-details{

    margin-top:20px;

}

.detail-row{

    display:flex;

    justify-content:space-between;

    padding:8px 0;

    border-bottom:1px solid #f1f5f9;

}

.message-box{

    margin-top:20px;

    padding:15px;

    border-radius:10px;

    background:#eef2ff;

    border-left:5px solid #4f46e5;

    min-height:70px;

    line-height:1.6;

}

@media(max-width:900px){

.main-grid{

grid-template-columns:1fr;

}

}

</style>
