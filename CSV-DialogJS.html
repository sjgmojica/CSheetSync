<script>

//======================================================
// GLOBAL VARIABLES
//======================================================

let selectedFile = null;

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const uploadBtn = document.getElementById("uploadBtn");
const cancelBtn = document.getElementById("cancelBtn");

const fileName = document.getElementById("fileName");
const fileSize = document.getElementById("fileSize");

const statusText = document.getElementById("statusText");
const progressBar = document.getElementById("progressBar");

//======================================================
// INITIALIZE
//======================================================

document.addEventListener("DOMContentLoaded", initialize);

function initialize() {

    bindEvents();

    resetDialog();

}

//======================================================
// EVENTS
//======================================================

function bindEvents() {

    // Browse

    dropZone.addEventListener("click", () => {

        fileInput.click();

    });

    fileInput.addEventListener("change", (e) => {

        if (e.target.files.length) {

            handleFile(e.target.files[0]);

        }

    });

    // Drag Enter

    dropZone.addEventListener("dragenter", (e) => {

        e.preventDefault();

        dropZone.classList.add("dragover");

    });

    // Drag Over

    dropZone.addEventListener("dragover", (e) => {

        e.preventDefault();

        dropZone.classList.add("dragover");

    });

    // Drag Leave

    dropZone.addEventListener("dragleave", () => {

        dropZone.classList.remove("dragover");

    });

    // Drop

    dropZone.addEventListener("drop", (e) => {

        e.preventDefault();

        dropZone.classList.remove("dragover");

        if (e.dataTransfer.files.length) {

            handleFile(e.dataTransfer.files[0]);

        }

    });

    // Upload

    uploadBtn.addEventListener("click", uploadFile);

    // Cancel

    cancelBtn.addEventListener("click", () => {

        google.script.host.close();

    });

}

//======================================================
// HANDLE FILE
//======================================================

function handleFile(file) {

    if (!file) return;

    if (!file.name.toLowerCase().endsWith(".csv")) {

        alert("Please select a CSV file.");

        return;

    }

    selectedFile = file;

    fileName.textContent = file.name;

    fileSize.textContent = formatFileSize(file.size);

    statusText.textContent = "Ready to upload";

    uploadBtn.disabled = false;

}

//======================================================
// RESET
//======================================================

function resetDialog() {

    selectedFile = null;

    uploadBtn.disabled = true;

    fileName.textContent = "No file selected";

    fileSize.textContent = "—";

    progressBar.style.width = "0%";

    statusText.textContent = "Waiting for CSV file...";

}

//======================================================
// FORMAT FILE SIZE
//======================================================

function formatFileSize(bytes) {

    if (bytes < 1024)

        return bytes + " bytes";

    if (bytes < 1024 * 1024)

        return (bytes / 1024).toFixed(1) + " KB";

    return (bytes / (1024 * 1024)).toFixed(2) + " MB";

}

//======================================================
// UPLOAD FILE
//======================================================

function uploadFile() {

    if (!selectedFile) {

        alert("Please select a CSV file.");

        return;

    }

    uploadBtn.disabled = true;

    progressBar.style.width = "20%";

    statusText.textContent = "Reading CSV file...";

    const reader = new FileReader();

    reader.onload = function(e) {

        progressBar.style.width = "50%";

        statusText.textContent = "Uploading to Apps Script...";

        google.script.run
            .withSuccessHandler(importCompleted)
            .withFailureHandler(importFailed)
            .processCSV(
                e.target.result,
                selectedFile.name
            );

    };

    reader.readAsText(selectedFile);

}

//======================================================
// IMPORT SUCCESS
//======================================================

function importCompleted(result) {

    progressBar.style.width = "100%";

    uploadBtn.disabled = false;

    if (!result.success) {

        statusText.textContent = "Import failed.";

        document.getElementById("messageBox").textContent =
            result.message;

        return;

    }

    statusText.textContent = "Import completed.";

    document.getElementById("totalCount").textContent =
        result.total;

    document.getElementById("updatedCount").textContent =
        result.updated;

    document.getElementById("insertedCount").textContent =
        result.inserted;

    document.getElementById("unchangedCount").textContent =
    result.unchanged;
    
    document.getElementById("skippedCount").textContent =
        result.skipped;

    document.getElementById("startedAt").textContent =
        result.startedAt;

    document.getElementById("completedAt").textContent =
        result.completedAt;

    document.getElementById("duration").textContent =
        result.duration;

    document.getElementById("messageBox").textContent =
        result.message;

}


//======================================================
// IMPORT FAILED
//======================================================

function importFailed(error) {

    uploadBtn.disabled = false;

    progressBar.style.width = "0%";

    statusText.textContent = "Import failed.";

    document.getElementById("messageBox").textContent =
        error.message || error;

}

</script>
